<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Tutor — Fireworks RFT Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0c0c12; color: #e0e0f0; height: 100vh; display: flex; flex-direction: column; }

  header { background: #111118; border-bottom: 1px solid #222230; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left h1 { font-size: 16px; font-weight: 700; color: white; }
  .model-badge { font-size: 11px; background: #1e1e30; border: 1px solid #333350; color: #a78bfa; padding: 3px 10px; border-radius: 20px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size: 12px; color: #4ade80; }

  .config-bar { background: #0f0f1a; border-bottom: 1px solid #1a1a28; padding: 10px 24px; display: flex; gap: 12px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .config-bar label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .config-bar input { background: #1a1a28; border: 1px solid #2a2a3e; color: #e0e0f0; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: 'SF Mono', monospace; }
  .config-bar input:focus { outline: none; border-color: #a78bfa; }
  #apiKeyInput { width: 280px; }
  #modelInput { width: 320px; }
  .config-bar input::placeholder { color: #444; }

  .suggestions { background: #0a0a12; border-bottom: 1px solid #1a1a28; padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
  .suggestions-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; white-space: nowrap; }
  .suggestion-btn { background: #141420; border: 1px solid #2a2a3e; color: #aaa; font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .suggestion-btn:hover { border-color: #ff6b35; color: #ff6b35; background: #1a1010; }

  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

  .msg { display: flex; gap: 12px; max-width: 780px; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .msg.user .avatar { background: linear-gradient(135deg, #ff6b35, #ff3d7f); }
  .msg.assistant .avatar { background: #1e1e30; border: 1px solid #333350; }

  .bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; max-width: 660px; }
  .msg.user .bubble { background: linear-gradient(135deg, #ff6b35, #ff3d7f); color: white; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #141420; border: 1px solid #222230; color: #e0e0f0; border-bottom-left-radius: 4px; }


  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #666; animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .welcome { text-align: center; padding: 40px 20px; color: #555; }
  .welcome .icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h2 { font-size: 20px; color: #888; margin-bottom: 8px; }
  .welcome p { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

  .input-bar { background: #111118; border-top: 1px solid #222230; padding: 16px 24px; display: flex; gap: 12px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; background: #1a1a28; border: 1px solid #2a2a3e; color: #e0e0f0; padding: 12px 16px; border-radius: 12px; font-size: 14px; font-family: inherit; resize: none; min-height: 48px; max-height: 160px; line-height: 1.5; transition: border-color 0.2s; overflow-y: auto; }
  textarea:focus { outline: none; border-color: #a78bfa; }
  textarea::placeholder { color: #444; }
  .send-btn { background: linear-gradient(135deg, #ff6b35, #ff3d7f); border: none; color: white; width: 48px; height: 48px; border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .send-btn:hover:not(:disabled) { opacity: 0.9; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .clear-btn { background: #1a1a28; border: 1px solid #2a2a3e; color: #666; padding: 0 16px; height: 48px; border-radius: 12px; cursor: pointer; font-size: 12px; transition: all 0.15s; flex-shrink: 0; }
  .clear-btn:hover { border-color: #f87171; color: #f87171; }
  .error-bubble { background: #1a0808; border: 1px solid #3a1a1a; border-left: 3px solid #f87171; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #f87171; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span style="font-size:20px">🔥</span>
    <h1>Math Tutor</h1>
    <span class="model-badge">Qwen3-0.6B · RFT Fine-tuned</span>
  </div>
  <div>
    <span class="status-dot"></span>
    <span class="status-text">Fireworks API</span>
  </div>
</header>

<div class="config-bar">
  <label>Model</label>
  <input type="text" id="modelInput" placeholder="accounts/xpl/deployments/dfywgadq" value="accounts/xpl/deployments/dfywgadq">
</div>

<div class="suggestions">
  <span class="suggestions-label">Try:</span>
  <button class="suggestion-btn" onclick="suggest(this)">I have 5 cookies. I eat 2. How many are left?</button>
  <button class="suggestion-btn" onclick="suggest(this)">4 boxes, each with 6 apples. How many apples total?</button>
  <button class="suggestion-btn" onclick="suggest(this)">Tom has 10 marbles, wins 5 more, finds 3 on the ground. Total?</button>
  <button class="suggestion-btn" onclick="suggest(this)">24 students split into groups of 4. How many groups?</button>
  <button class="suggestion-btn" onclick="suggest(this)">A pencil costs $2, a notebook $5. Cost of 3 pencils and 1 notebook?</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">🧮</div>
    <h2>Ask me a math problem</h2>
    <p>This model was trained using Reinforcement Fine-Tuning on 1,000 GSM8K math problems. It shows its reasoning before giving the final answer.</p>
  </div>
</div>

<div class="input-bar">
  <textarea id="msgInput" placeholder="Ask a math question..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="clear-btn" onclick="clearChat()">Clear</button>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script>
let messages = [];
let isLoading = false;

function stripMarkdown(text) {
  return text.replace(/\*+/g, '').replace(/#{1,6}\s?/g, '').replace(/\n{3,}/g, '\n\n').trim();
}

function suggest(btn) {
  const input = document.getElementById('msgInput');
  input.value = btn.textContent;
  autoResize(input);
  input.focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function clearChat() {
  messages = [];
  document.getElementById('chatArea').innerHTML = `<div class="welcome" id="welcome"><div class="icon">🧮</div><h2>Ask me a math problem</h2><p>This model was trained using Reinforcement Fine-Tuning on 1,000 GSM8K math problems. It shows its reasoning before giving the final answer.</p></div>`;
}

function addMessage(role, content) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const area = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant') {
    const thinkMatch = content.match(/<think>([\s\S]*?)<\/think>/i);
    const text = thinkMatch ? thinkMatch[1].trim() : content.trim();
    bubble.textContent = text;
  } else {
    bubble.textContent = content;
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  area.appendChild(msg);
  area.scrollTop = area.scrollHeight;
}

function addTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const area = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'msg assistant'; msg.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'avatar'; avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msg.appendChild(avatar); msg.appendChild(bubble);
  area.appendChild(msg); area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function addError(text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const area = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  const avatar = document.createElement('div');
  avatar.className = 'avatar'; avatar.textContent = '⚠️';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<div class="error-bubble">${text}</div>`;
  msg.appendChild(avatar); msg.appendChild(bubble);
  area.appendChild(msg); area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const apiKey = 'fw_LZYbRvBG8hb2jCi4kh1ymb';
  const model = document.getElementById('modelInput').value.trim();

  if (!model || !model.startsWith('accounts/')) {
    addError('Please enter your model deployment ID (e.g. accounts/xpl/deployments/dfywgadq) in the config bar above.'); return;
  }

  input.value = ''; autoResize(input);
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  addTyping();

  try {
    const res = await fetch('https://api.fireworks.ai/inference/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        max_tokens: 2048,
        messages: [
          { role: 'system', content: 'You are a math tutor. Solve the problem step by step in plain text. At the very end, write exactly: Final Answer: [number]. Never use asterisks, bullet points, bold, or any markdown formatting.' },
          ...messages
        ]
      })
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      addError(`API error ${res.status}: ${data.message || JSON.stringify(data)}`);
    } else {
      const reply = data.choices[0].message.content;
      addMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    removeTyping();
    addError(`Network error: ${err.message}`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
